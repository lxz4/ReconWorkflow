name: Subdomain & Vulnerability Scanner

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6 AM UTC
  workflow_dispatch:
    inputs:
      domain:
        description: 'Domain to scan'
        required: true
        default: 'example.com'

jobs:
  scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
      
      - name: Install Subfinder
        run: |
          go install -v github.com/projectdiscovery/subfinder/v2/cmd/subfinder@latest
      
      - name: Install Nuclei
        run: |
          go install -v github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest
      
      - name: Run Subfinder
        run: |
          subfinder -d ${{ github.event.inputs.domain || 'example.com' }} -o subdomains.txt
      
      - name: Run Nuclei
        run: |
          nuclei -l subdomains.txt -s critical,high,medium -o nuclei-results.txt -json || true
      
      - name: Send Discord Notification
        if: always()
        run: |
          if [ -s nuclei-results.txt ]; then
            MESSAGE="🚨 Vulnerabilities found for ${{ github.event.inputs.domain || 'example.com' }}"
            curl -X POST ${{ secrets.DISCORD_WEBHOOK }} \
              -H 'Content-Type: application/json' \
              -d '{"content":"'"$MESSAGE"'"}'
          else
            MESSAGE="✅ Scan completed for ${{ github.event.inputs.domain || 'example.com' }} - No vulnerabilities found"
            curl -X POST ${{ secrets.DISCORD_WEBHOOK }} \
              -H 'Content-Type: application/json' \
              -d '{"content":"'"$MESSAGE"'"}'
          fi
      
      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: scan-results
          path: |
            subdomains.txt
            nuclei-results.txt
